[DEFAULT]
debug = false
smtp_server = localhost
error_email_from = paste@localhost

[server:main]
use = egg:Paste#http
host = 0.0.0.0
port = 5000

[app:main]
use = config:../ckan/test-core.ini

# Override test-core.ini localhost addresses with Docker service names
solr_url = http://solr:8983/solr/ckan
sqlalchemy.url = postgresql://ckan:ckan@postgres/ckan_test?sslmode=disable
ckan.redis.url = redis://redis:6379/0

## Plugins Settings
ckan.plugins =
             datavic_odp_schema
             scheming_datasets
             alias

## Storage
ckan.storage_path = /tmp/ckan_test_storage

## ckanext-scheming settings
scheming.dataset_schemas = ckanext.datavic_odp_schema:odp_dataset_schema.yaml
scheming.presets = ckanext.scheming:presets.json ckanext.alias:presets.yaml
scheming.dataset_fallback = false

# Logging configuration
[loggers]
keys = root, ckan, sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_ckan]
qualname = ckan
handlers =
level = INFO

[logger_sqlalchemy]
handlers =
qualname = sqlalchemy.engine
level = WARN

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
